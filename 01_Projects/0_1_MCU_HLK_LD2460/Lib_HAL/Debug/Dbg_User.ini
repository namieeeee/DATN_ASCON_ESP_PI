/******************************************************************************/
/* Dbg_User.ini: Initialization Script for Debugging in User ROM             */
/******************************************************************************/
load %L incremental

_WDWORD(0xE000EDFC, 0x00000001);          // VC_CORERESET = 1. Reset Vector Catch enabled

_WDWORD(0x4001F020, 0x01000000);          // REMAP = 1. Remap to User ROM
_WDWORD(0x4001F020, 0x01000080);          // REBOOT = 1. Reboot command

RESET

//G, main


