/******************************************************************************/
/* Dbg_Boot.ini: Initialization Script for Debugging in Boot ROM            */
/******************************************************************************/
load %L incremental

_WDWORD(0xE000EDFC, 0x00000001);          // VC_CORERESET = 1. Reset Vector Catch enabled

_WDWORD(0x4001F020, 0x00000000);          // REMAP = 0. Remap to Boot ROM
_WDWORD(0x4001F020, 0x00000080);          // REBOOT = 1. Reboot command

RESET

//G, main


