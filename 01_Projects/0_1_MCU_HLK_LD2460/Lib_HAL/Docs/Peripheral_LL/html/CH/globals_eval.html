<script>
    /* Hide navbar and sidebar in QS */

    }
    else {
        $(function () { init_search(); });
        $(function () {
            var navSelector = '#toc';
            var $myNav = $(navSelector);
            Toc.init({
                $nav: $('#toc'),
                $scope: $('.contents')
            });
            $('body').scrollspy({
                target: navSelector
            });
        });
    }
    $("body").fadeIn(100);
    resizecardImg();
    window.onresize = resize;
    SetBackToIndex();
    /**
     * 实现图片点击放大、拖拽、滚轴滚动焦点缩放功能，相关参数、函数声明
     */
    let imgWidth, imgHeight; // 图片点击放大初始尺寸参数
    let maxZoom = 4; //最大缩放倍数
    let minreduce = 0.5; // 最小缩放倍数
    let initScale = 1; //滚动缩放初始倍数，并不是图片点击放大的倍数
    let isPointerdown = false; //鼠标按下的标识
    //记录鼠标按下坐标和按下移动时坐标
    let lastPointermove = {
        x: 0,
        y: 0,
    };
    //移动过程从上一个坐标到下一个坐标之间的差值
    let diff = {
        x: 0,
        y: 0,
    };
    //图片放大后左上角的坐标，主要结合diff参数用于鼠标焦点缩放时图片偏移坐标
    let x = 0;
    let y = 0;
    // 记录节点
    const allImg = document.querySelectorAll(".image img, p img");
    const outerdiv = document.querySelector("#outerdiv");
    const image = outerdiv.querySelector("#bigimg");
    window.onload = function () {
        allImg.forEach((item) => {
            item.addEventListener("click", (e) => {
                const that = e.target;
                image.style.transform = "scale(1)";
                //图片放大展示函数调用
                imgShow(that);
                // 监听鼠标滚动事件
                window.addEventListener("wheel", handleStopWheel, {
                    passive: false,
                });
                // 拖转事件调用
                imgDrag();
            });
        });
    };
    mermaid.initialize({
        startOnLoad: true,
        theme: 'base',
        themeVariables: {
            primaryColor: '#F4F4FF',
            secondaryColor: 'rgba(244,244,255,0.9)',
            tertiaryColor: '#F9FAFC',
        },
    });
</script>
